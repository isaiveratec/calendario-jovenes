<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calendario de Formación Cristiana 2026</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .day-cell {
            min-height: 110px;
            transition: all 0.2s;
        }

        .day-cell:hover {
            background-color: #f1f5f9;
        }

        .event-tag {
            font-size: 0.7rem;
            padding: 4px 6px;
            border-radius: 6px;
            margin-top: 4px;
            cursor: pointer;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 500;
        }

        .event-adolescentes { background-color: #dcfce7; color: #166534; border-left: 3px solid #22c55e; }
        .event-jovenes { background-color: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal.active { display: flex; }

        .filter-btn-active {
            background-color: #1e293b !important;
            color: white !important;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto p-4 md:p-8">
    <!-- Encabezado del Calendario -->
    <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Programación 2026</h1>
            <p class="text-slate-500 mt-1">Cronograma de Clases: Adolescentes y Jóvenes</p>
        </div>
        
        <div class="flex items-center gap-3 bg-white p-2 rounded-xl border shadow-sm">
            <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-lg transition text-slate-600"><i class="fas fa-chevron-left"></i></button>
            <h2 id="currentMonthDisplay" class="text-lg font-bold min-w-[160px] text-center text-slate-800">Febrero 2026</h2>
            <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-lg transition text-slate-600"><i class="fas fa-chevron-right"></i></button>
        </div>
    </header>

    <!-- Sección de Filtros -->
    <div class="mb-8 space-y-4">
        <div class="flex flex-wrap items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mr-2">Filtrar por Grupo:</span>
            <button onclick="setFilter('group', 'all')" id="filter-group-all" class="filter-btn-active px-5 py-2 rounded-full bg-white text-slate-700 text-sm font-semibold border shadow-sm transition hover:scale-105">Todos</button>
            <button onclick="setFilter('group', 'Adolescentes')" id="filter-group-Adolescentes" class="px-5 py-2 rounded-full bg-white text-green-700 text-sm font-semibold border border-green-200 shadow-sm transition hover:scale-105 hover:bg-green-50">Adolescentes</button>
            <button onclick="setFilter('group', 'Jóvenes')" id="filter-group-Jóvenes" class="px-5 py-2 rounded-full bg-white text-blue-700 text-sm font-semibold border border-blue-200 shadow-sm transition hover:scale-105 hover:bg-blue-50">Jóvenes</button>
        </div>
        
        <div class="flex flex-wrap items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mr-2">Filtrar por Maestro:</span>
            <button onclick="setFilter('teacher', 'all')" id="filter-teacher-all" class="filter-btn-active px-5 py-2 rounded-full bg-white text-slate-700 text-sm font-semibold border shadow-sm transition hover:scale-105">Todos los Maestros</button>
            <button onclick="setFilter('teacher', 'Isaì y Ara')" id="filter-teacher-Isaì" class="px-5 py-2 rounded-full bg-white text-slate-700 text-sm font-semibold border border-slate-200 shadow-sm transition hover:scale-105 hover:bg-slate-50">Isaì y Ara</button>
            <button onclick="setFilter('teacher', 'Sam y Eli')" id="filter-teacher-Sam" class="px-5 py-2 rounded-full bg-white text-slate-700 text-sm font-semibold border border-slate-200 shadow-sm transition hover:scale-105 hover:bg-slate-50">Sam y Eli</button>
        </div>
    </div>

    <!-- Contenedor del Calendario -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        <div class="calendar-grid border-b bg-slate-50">
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Dom</div>
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Lun</div>
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Mar</div>
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Mié</div>
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Jue</div>
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Vie</div>
            <div class="py-4 text-center text-xs font-bold text-slate-400 uppercase tracking-widest">Sáb</div>
        </div>
        <div id="calendarDays" class="calendar-grid">
            <!-- Los días se inyectan dinámicamente -->
        </div>
    </div>
</div>

<!-- Ventana Modal de Detalles -->
<div id="eventModal" class="modal" onclick="closeModal()">
    <div class="bg-white rounded-3xl p-8 max-w-md w-full m-4 shadow-2xl transition-all transform scale-95 opacity-0 active:scale-100 active:opacity-100" id="modalContent" onclick="event.stopPropagation()">
        <div class="flex justify-between items-start mb-6">
            <span id="modalGroup" class="text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full"></span>
            <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <h3 id="modalTitle" class="text-2xl font-extrabold text-slate-900 mb-4 leading-tight"></h3>
        
        <div class="space-y-4">
            <div class="flex items-center gap-3 text-slate-600">
                <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
                    <i class="far fa-calendar-alt"></i>
                </div>
                <span id="modalDate" class="font-medium"></span>
            </div>
            
            <div class="flex items-center gap-3 text-slate-600">
                <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
                    <i class="fas fa-user-tie text-sm"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1">Maestros</p>
                    <p id="modalTeachers" class="font-bold text-slate-800"></p>
                </div>
            </div>
        </div>

        <button onclick="closeModal()" class="mt-8 w-full py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition">Cerrar</button>
    </div>
</div>

<script>
    // Listado de clases y actividades
    const events = [
        // ADOLESCENTES
        { group: "Adolescentes", title: "El marco del evangelio", date: "2026-02-01", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "Aparentando vs. vivir el evangelio", date: "2026-02-15", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "Creyendo en el evangelio", date: "2026-03-01", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "La ley y el evangelio", date: "2026-03-15", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "El arrepentimiento", date: "2026-03-29", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "La idolatría del corazón", date: "2026-04-05", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "La misión", date: "2026-04-19", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "El perdón", date: "2026-05-03", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "El conflicto", date: "2026-05-17", teachers: "Isaí y Ara" },
        
        // JÓVENES
        { group: "Jóvenes", title: "Prefacio", date: "2026-02-05", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Prefacio", date: "2026-02-06", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 1: La ley de la naturaleza humana", date: "2026-02-19", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 1: Continuación", date: "2026-02-20", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 1: Lo que yace detrás de la ley", date: "2026-03-06", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 1: Conclusión", date: "2026-03-07", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 2: Las concepciones rivales de Dios", date: "2026-03-20", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 2: La invasión", date: "2026-03-21", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 2: El perfecto penitente", date: "2026-04-03", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 2: Conclusión práctica", date: "2026-04-04", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: Las virtudes cardinales", date: "2026-04-17", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: Moral Social", date: "2026-04-18", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: Moral Sexual y Matrimonio", date: "2026-05-01", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: El Gran Pecado", date: "2026-05-02", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: Caridad y Esperanza", date: "2026-05-15", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: Fe", date: "2026-05-16", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: Fe (Continuación)", date: "2026-05-29", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: Conclusión del Libro 3", date: "2026-05-30", teachers: "Isaì y Ara" }
    ];

    let currentDate = new Date(2026, 1, 1); // Febrero 2026 por defecto
    let activeFilters = {
        group: 'all',
        teacher: 'all'
    };

    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    // Función principal para dibujar el calendario
    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        document.getElementById('currentMonthDisplay').innerText = `${monthNames[month]} ${year}`;
        
        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const calendarDays = document.getElementById('calendarDays');
        calendarDays.innerHTML = '';

        // Rellenar días del mes anterior si es necesario
        for (let i = 0; i < firstDayOfMonth; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell border-r border-b bg-slate-50/30';
            calendarDays.appendChild(emptyCell);
        }

        // Crear celdas para cada día
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayCell = document.createElement('div');
            dayCell.className = 'day-cell border-r border-b p-3 relative flex flex-col items-start';
            
            const dayNum = document.createElement('span');
            dayNum.className = 'text-sm font-bold text-slate-400 mb-1';
            dayNum.innerText = day;
            dayCell.appendChild(dayNum);

            // Filtrar eventos para este día según los filtros activos
            const dayEvents = events.filter(e => {
                const dateMatch = e.date === dateStr;
                const groupMatch = activeFilters.group === 'all' || e.group === activeFilters.group;
                const teacherMatch = activeFilters.teacher === 'all' || e.teachers.includes(activeFilters.teacher.split(' ')[0]);
                
                return dateMatch && groupMatch && teacherMatch;
            });
            
            dayEvents.forEach(event => {
                const eventEl = document.createElement('div');
                eventEl.className = `event-tag ${event.group === 'Adolescentes' ? 'event-adolescentes' : 'event-jovenes'}`;
                eventEl.innerText = event.title;
                eventEl.onclick = () => openModal(event);
                dayCell.appendChild(eventEl);
            });

            calendarDays.appendChild(dayCell);
        }
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderCalendar();
    }

    function setFilter(type, value) {
        activeFilters[type] = value;
        
        // Actualizar estados visuales de los botones de filtro
        const prefix = type === 'group' ? 'filter-group' : 'filter-teacher';
        const buttons = document.querySelectorAll(`button[id^="${prefix}-"]`);
        
        buttons.forEach(btn => {
            btn.classList.remove('filter-btn-active');
            if (btn.id.includes(value.split(' ')[0])) {
                btn.classList.add('filter-btn-active');
            }
        });

        renderCalendar();
    }

    function openModal(event) {
        const modal = document.getElementById('eventModal');
        const content = document.getElementById('modalContent');
        const groupEl = document.getElementById('modalGroup');
        
        groupEl.innerText = event.group;
        groupEl.className = `text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${event.group === 'Adolescentes' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`;
        
        document.getElementById('modalTitle').innerText = event.title;
        document.getElementById('modalDate').innerText = new Date(event.date + 'T00:00:00').toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('modalTeachers').innerText = event.teachers;
        
        modal.classList.add('active');
        setTimeout(() => {
            content.classList.remove('scale-95', 'opacity-0');
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById('eventModal');
        const content = document.getElementById('modalContent');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            modal.classList.remove('active');
        }, 200);
    }

    window.onload = renderCalendar;
</script>

</body>
</html>
