<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calendario de Formación Cristiana 2026</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Cuadrícula base */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        /* Estilos de celda responsivos */
        .day-cell {
            min-height: 110px;
            transition: all 0.2s;
        }

        @media (max-width: 640px) {
            .calendar-grid-header {
                display: none; /* Ocultar cabecera de días en móvil */
            }
            .calendar-grid {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 8px;
            }
            .day-cell {
                min-height: auto;
                border: 1px solid #e2e8f0;
                border-radius: 16px;
                background: white;
                padding: 14px;
            }
            .day-cell.empty-cell {
                display: none; /* No mostrar celdas vacías en móvil */
            }
        }

        .event-tag {
            font-size: 0.75rem;
            padding: 6px 10px;
            border-radius: 8px;
            margin-top: 6px;
            cursor: pointer;
            line-height: 1.4;
            display: block;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.1s;
        }
        
        .event-tag:active {
            transform: scale(0.98);
        }

        /* Colores por Maestro */
        .event-isai-ara { background-color: #f0fdf4; color: #166534; border-left: 4px solid #22c55e; }
        .event-sam-eli { background-color: #eff6ff; color: #1e40af; border-left: 4px solid #3b82f6; }
        .event-default { background-color: #f8fafc; color: #475569; border-left: 4px solid #cbd5e1; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 16px;
        }

        .modal.active { display: flex; }

        .filter-btn-active {
            background-color: #0f172a !important;
            color: white !important;
            border-color: #0f172a !important;
        }

        /* Scrollbar suave */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-10">

<div class="max-w-4xl mx-auto p-4 md:p-8">
    <!-- Encabezado -->
    <header class="mb-6 space-y-4">
        <div class="flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Programación 2026</h1>
            <div class="hidden md:block text-right">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Maestros & Grupos</p>
            </div>
        </div>
        
        <!-- Navegación de Mes -->
        <div class="flex items-center justify-between bg-white p-2 rounded-2xl border shadow-sm">
            <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition text-slate-600">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h2 id="currentMonthDisplay" class="text-lg font-bold text-slate-800">Febrero 2026</h2>
            <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition text-slate-600">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </header>

    <!-- Filtros Responsivos -->
    <div class="mb-6 space-y-4">
        <!-- Filtro Grupos -->
        <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Filtrar por Grupo:</p>
            <div class="flex overflow-x-auto pb-1 gap-2 no-scrollbar">
                <button onclick="setFilter('group', 'all')" id="filter-group-all" class="filter-btn-active whitespace-nowrap px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold border border-slate-200 transition">Todos</button>
                <button onclick="setFilter('group', 'Adolescentes')" id="filter-group-Adolescentes" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold border border-slate-200 transition">Adolescentes</button>
                <button onclick="setFilter('group', 'Jóvenes')" id="filter-group-Jóvenes" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold border border-slate-200 transition">Jóvenes</button>
            </div>
        </div>

        <!-- Filtro Maestros -->
        <div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Filtrar por Maestro:</p>
            <div class="flex overflow-x-auto pb-1 gap-2 no-scrollbar">
                <button onclick="setFilter('teacher', 'all')" id="filter-teacher-all" class="filter-btn-active whitespace-nowrap px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold border border-slate-200 transition">Todos</button>
                <button onclick="setFilter('teacher', 'Isaì')" id="filter-teacher-Isaì" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold border border-slate-200 transition border-l-4 border-l-green-500">Isaí y Ara</button>
                <button onclick="setFilter('teacher', 'Sam')" id="filter-teacher-Sam" class="whitespace-nowrap px-4 py-2 rounded-xl bg-white text-slate-600 text-sm font-bold border border-slate-200 transition border-l-4 border-l-blue-500">Sam y Eli</button>
            </div>
        </div>
    </div>

    <!-- Calendario -->
    <div class="bg-white md:rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-200">
        <!-- Cabecera de días (Solo Desktop) -->
        <div class="calendar-grid calendar-grid-header border-b bg-slate-50/50">
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Dom</div>
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Lun</div>
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Mar</div>
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Mié</div>
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Jue</div>
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Vie</div>
            <div class="py-3 text-center text-[10px] font-black text-slate-400 uppercase tracking-tighter">Sáb</div>
        </div>
        
        <!-- Contenedor de días -->
        <div id="calendarDays" class="calendar-grid">
            <!-- Inyectado por JS -->
        </div>
    </div>
</div>

<!-- Modal Detalle -->
<div id="eventModal" class="modal" onclick="closeModal()">
    <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl transition-all transform scale-95 opacity-0" id="modalContent" onclick="event.stopPropagation()">
        <div class="flex justify-between items-start mb-6">
            <span id="modalGroup" class="text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full bg-slate-100 text-slate-500"></span>
            <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-slate-600 transition"><i class="fas fa-times text-xl"></i></button>
        </div>
        
        <h3 id="modalTitle" class="text-xl font-bold text-slate-900 mb-6 leading-tight"></h3>
        
        <div class="space-y-5">
            <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center shrink-0">
                    <i class="far fa-calendar-alt text-indigo-500"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Fecha</p>
                    <p id="modalDate" class="font-semibold text-slate-700"></p>
                </div>
            </div>
            
            <div class="flex items-start gap-4">
                <div id="modalTeacherIcon" class="w-10 h-10 rounded-2xl flex items-center justify-center shrink-0">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Maestros</p>
                    <p id="modalTeachers" class="font-semibold text-slate-700"></p>
                </div>
            </div>
        </div>

        <button onclick="closeModal()" class="mt-10 w-full py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-lg shadow-slate-200 transition active:scale-95">Entendido</button>
    </div>
</div>

<script>
    const events = [
        { group: "Adolescentes", title: "El marco del evangelio", date: "2026-02-01", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "Aparentando vs. vivir el evangelio", date: "2026-02-15", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "Creyendo en el evangelio", date: "2026-03-01", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "La ley y el evangelio", date: "2026-03-15", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "El arrepentimiento", date: "2026-03-29", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "La idolatría del corazón", date: "2026-04-05", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "La misión", date: "2026-04-19", teachers: "Isaì y Ara" },
        { group: "Adolescentes", title: "El perdón", date: "2026-05-03", teachers: "Sam y Eli" },
        { group: "Adolescentes", title: "El conflicto", date: "2026-05-17", teachers: "Isaí y Ara" },
        { group: "Jóvenes", title: "Prefacio", date: "2026-02-05", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Prefacio", date: "2026-02-06", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 1: 1. LA LEY DE LA NATURALEZA HUMANA, 2. ALGUNAS OBJECIONES, 3. LA REALIDAD DE LA LEY", date: "2026-02-19", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 1: 1. LA LEY DE LA NATURALEZA HUMANA, 2. ALGUNAS OBJECIONES, 3. LA REALIDAD DE LA LEY", date: "2026-02-20", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 1: 4. LO QUE YACE DETRÁS DE LA LEY, 5. TENEMOS MOTIVOS PARA ESTAR INQUIETOS", date: "2026-03-06", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 1: 4. LO QUE YACE DETRÁS DE LA LEY, 5. TENEMOS MOTIVOS PARA ESTAR INQUIETOS", date: "2026-03-07", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 2: 1. LAS CONCEPCIONES RIVALES DE DIOS, 2. LA INVASIÓN", date: "2026-03-20", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 2: 1. LAS CONCEPCIONES RIVALES DE DIOS, 2. LA INVASIÓN", date: "2026-03-21", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 2: 3. LA ALTERNATIVA IMPACTANTE, 4. EL PERFECTO PENITENTE, 5. LA CONCLUSIÓN PRÁCTICA", date: "2026-04-03", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 2: 3. LA ALTERNATIVA IMPACTANTE, 4. EL PERFECTO PENITENTE, 5. LA CONCLUSIÓN PRÁCTICA", date: "2026-04-04", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: 1. LAS TRES PARTES DE LA MORALIDAD, 2. LAS VIRTUDES CARDINALES, 3. LA MORAL SOCIAL", date: "2026-04-17", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: 1. LAS TRES PARTES DE LA MORALIDAD, 2. LAS VIRTUDES CARDINALES, 3. LA MORAL SOCIAL", date: "2026-04-18", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: 4. LA MORAL Y EL PSICOANÁLISIS, 5. MORAL SEXUAL, 6. EL MATRIMONIO CRISTIANO", date: "2026-05-01", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: 4. LA MORAL Y EL PSICOANÁLISIS, 5. MORAL SEXUAL, 6. EL MATRIMONIO CRISTIANO", date: "2026-05-02", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: 7. EL PERDÓN, 8. EL GRAN PECADO, 9. CARIDAD", date: "2026-05-15", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: 7. EL PERDÓN, 8. EL GRAN PECADO, 9. CARIDAD", date: "2026-05-16", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 3: 10. ESPERANZA, 11. FE, 12. FE", date: "2026-05-29", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 3: 10. ESPERANZA, 11. FE, 12. FE", date: "2026-05-30", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 4: 1. HACER Y ENGENDRAR, 2. EL DIOS TRIPERSONAL, 3. EL TIEMPO Y MÁS ALLÁ DEL TIEMPO", date: "2026-06-12", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 4: 1. HACER Y ENGENDRAR, 2. EL DIOS TRIPERSONAL, 3. EL TIEMPO Y MÁS ALLÁ DEL TIEMPO", date: "2026-06-13", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 4: 4. BUEN CONTAGIO, 5. LOS PORFIADOS SOLDADOS DE JUGUETE, 6. DOS NOTAS", date: "2026-06-26", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 4: 4. BUEN CONTAGIO, 5. LOS PORFIADOS SOLDADOS DE JUGUETE, 6. DOS NOTAS", date: "2026-06-27", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 4: 7. JUGAR A SER, 8. ¿ES DIFÍCIL O FÁCIL SER CRISTIANO?", date: "2026-07-10", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 4: 7. JUGAR A SER, 8. ¿ES DIFÍCIL O FÁCIL SER CRISTIANO?", date: "2026-07-11", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 4: 9. CALCULANDO EL COSTO, 10. PERSONAS AGRADABLES O NUEVOS HOMBRES", date: "2026-07-24", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 4: 9. CALCULANDO EL COSTO, 10. PERSONAS AGRADABLES O NUEVOS HOMBRES", date: "2026-07-25", teachers: "Isaì y Ara" },
        { group: "Jóvenes", title: "Libro 4: 11. LOS NUEVOS HOMBRES", date: "2026-08-07", teachers: "Sam y Eli" },
        { group: "Jóvenes", title: "Libro 4: 11. LOS NUEVOS HOMBRES", date: "2026-08-08", teachers: "Sam y Eli" }
    ];

    let currentDate = new Date(2026, 1, 1);
    let groupFilter = 'all';
    let teacherFilter = 'all';

    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const weekDays = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

    function getEventClass(teachers) {
        if (teachers.includes("Isaì") || teachers.includes("Isaí")) return "event-isai-ara";
        if (teachers.includes("Sam")) return "event-sam-eli";
        return "event-default";
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        document.getElementById('currentMonthDisplay').innerText = `${monthNames[month]} ${year}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const calendarDays = document.getElementById('calendarDays');
        calendarDays.innerHTML = '';

        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'day-cell empty-cell border-r border-b bg-slate-50/30';
            calendarDays.appendChild(empty);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayOfWeek = new Date(year, month, day).getDay();
            
            const cell = document.createElement('div');
            cell.className = 'day-cell border-r border-b p-2 flex flex-col items-start';
            
            const dayHeader = document.createElement('div');
            dayHeader.className = 'flex items-center justify-between w-full mb-1';
            
            const num = document.createElement('span');
            num.className = 'text-xs md:text-[10px] font-bold text-slate-400';
            num.innerHTML = `<span class="sm:hidden text-slate-500 mr-2">${weekDays[dayOfWeek]}</span> ${day}`;
            dayHeader.appendChild(num);
            cell.appendChild(dayHeader);

            const dayEvents = events.filter(e => {
                const matchGroup = groupFilter === 'all' || e.group === groupFilter;
                const matchTeacher = teacherFilter === 'all' || e.teachers.includes(teacherFilter);
                return e.date === dateStr && matchGroup && matchTeacher;
            });
            
            dayEvents.forEach(event => {
                const tag = document.createElement('div');
                tag.className = `event-tag ${getEventClass(event.teachers)}`;
                const letter = event.group.charAt(0);
                tag.innerHTML = `<div class="flex items-start gap-2">
                    <span class="font-black opacity-40">${letter}</span>
                    <span class="font-medium">${event.title}</span>
                </div>`;
                tag.onclick = () => openModal(event);
                cell.appendChild(tag);
            });
            
            calendarDays.appendChild(cell);
        }
    }

    function changeMonth(d) {
        currentDate.setMonth(currentDate.getMonth() + d);
        renderCalendar();
    }

    function setFilter(type, val) {
        if (type === 'group') groupFilter = val;
        if (type === 'teacher') teacherFilter = val;

        // Actualizar UI de botones
        document.querySelectorAll(`button[id^="filter-${type}-"]`).forEach(b => {
            b.classList.remove('filter-btn-active');
            if (b.id.endsWith(val)) b.classList.add('filter-btn-active');
        });
        
        renderCalendar();
    }

    function openModal(e) {
        const m = document.getElementById('eventModal');
        const content = document.getElementById('modalContent');
        const teacherIcon = document.getElementById('modalTeacherIcon');
        
        document.getElementById('modalGroup').innerText = e.group;
        document.getElementById('modalTitle').innerText = e.title;
        document.getElementById('modalDate').innerText = new Date(e.date + 'T00:00:00').toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        document.getElementById('modalTeachers').innerText = e.teachers;
        
        // Estilo del icono en el modal según maestro
        if (e.teachers.includes("Isa")) {
            teacherIcon.className = "w-10 h-10 rounded-2xl bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0";
        } else {
            teacherIcon.className = "w-10 h-10 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center shrink-0";
        }
        
        m.classList.add('active');
        setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10);
    }

    function closeModal() {
        const content = document.getElementById('modalContent');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => document.getElementById('eventModal').classList.remove('active'), 200);
    }

    window.onload = renderCalendar;
</script>
</body>
</html>
